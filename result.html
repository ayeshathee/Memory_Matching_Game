<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Game Result</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>

.result-container {
    max-width: 550px;     
    margin: 50px auto;     
    padding: 30px;       
    background: rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
}


.result-container p {
    font-size: 30px;    
    margin: 15px 0;        
    line-height: 1.5;      
}

.result-container button {
    width: 100%;     
    padding: 16px 0;      
    margin: 10px 0;       
    font-size: 18px;       
    border-radius: 12px;   
    font-weight: bold;
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.result-container button:hover {
    transform: scale(1.05);
    background: linear-gradient(to right, #0072ff, #00c6ff);
}

#stars {
    font-size: 50px;   
    color: gold;   
    letter-spacing: 5px; 
    display: inline-block;
}

</style>
</head>

<body>
<div class="result-container">
<h1>Game Result</h1>

<p><span id="stars"></span></p>

<p>You scored <span id="score"></span> points</p>
<br>
<p>Correct: <span id="finalCorrect"></span></p>

<p>Incorrect: <span id="finalIncorrect"></span></p>

<p>Total Moves: <span id="finalMoves"></span></p>

<p>Time: <span id="finalTime"></span>s</p>

<button onclick="restartGame()">Try Again</button>
<br><br>
<button onclick="goHome()">Back to Menu</button>
</div>

<script src="js/result.js"></script>

</body>
</html>
