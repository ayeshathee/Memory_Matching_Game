<!DOCTYPE html>
<html>

<head>
<title>Memory Game</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    font-family: Arial;
    text-align: center;
}

#board{
    margin: 20px auto;
    width: 420px;
    display: grid;
    grid-template-columns: repeat(6,1fr);
    gap: 10px;
}

.card{
    height: 60px;
    background: #444;
    color: white;
    font-size: 30px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

</style>

</head>

<body>

<button onclick="goHome()">Quit</button>

<h3>Correct: <span id="correct">0</span></h3>
<h3>Incorrect: <span id="incorrect">0</span></h3>
<h3>Time: <span id="time">0</span>s</h3>
<h3>Moves: <span id="moves">0</span></h3>

<div id="board"></div>


<script src="js/game.js"></script>
</body>
</html>
