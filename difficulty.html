<!DOCTYPE html>
<html>

<head>
<title>Select Difficulty</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/home.css">
</head>

<body>
<br><br>
<button class="back-btn" onclick="goHome()"><i class="bi bi-arrow-left"></i> Back</button>
<br><br>
<h1>Select Difficulty</h1>
<br><br><br>
<h3>Choose a grid size</h3>

<div class="mode-container">

    <div class="mode-card">
        <div class="icon"><i class="bi bi-star"></i></div>
        <h3>2x2 Grid</h3>
        <p>Tutorial level for beginners</p>
        <button onclick="selectDifficulty(2)">Select</button>
    </div>

    <div class="mode-card">
        <div class="icon"><i class="bi bi-star"></i>  <i class="bi bi-star"></i></div>
        <h3>4x4 Grid</h3>
        <p>Beginner friendly challenge</p>
        <button onclick="selectDifficulty(4)">Select</button>
    </div>

    <div class="mode-card">
        <div class="icon"><i class="bi bi-star"></i>  <i class="bi bi-star"></i>  <i class="bi bi-star"></i></div>
        <h3>6x6 Grid</h3>
        <p>Expert level difficulty</p>
        <button onclick="selectDifficulty(6)">Select</button>
    </div>
</div>

<script src="js/home.js"></script>
</body>
</html>
